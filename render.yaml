# Render.com Blueprint -- pilvideploy suoraan GitHub-reposta.
# Ohje: Render.com -> New + -> Blueprint -> valitse tämä repo.
services:
  - type: web
    name: asake-raha
    runtime: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn app:app --bind 0.0.0.0:$PORT --timeout 120
    envVars:
      - key: PYTHON_VERSION
        value: "3.12.10"
